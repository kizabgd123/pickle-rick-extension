Korak-po-Korak Vodič kroz Notebook
Sledeći koraci predstavljaju sintezu tipičnog procesa rada na Titanic projektu, zasnovanu na analizi brojnih javno dostupnih Kaggle Notebook-ova.38
Korak 1: Postavljanje Okruženja i Učitavanje Podataka
Prvi korak u svakom notebook-u je importovanje neophodnih Python biblioteka (pandas za manipulaciju podacima, numpy za numeričke operacije, matplotlib i seaborn za vizualizaciju) i učitavanje train.csv i test.csv fajlova u Pandas DataFrame objekte.39
Korak 2: Eksploratorna Analiza Podataka (EDA)
Cilj EDA je dubinsko razumevanje podataka pre izgradnje modela. Ovo uključuje:
Osnovni pregled: Korišćenje funkcija kao što su .info() da se vide tipovi podataka i broj nedostajućih vrednosti, .describe() za statistički pregled numeričkih kolona, i .isnull().sum() za precizan broj nedostajućih vrednosti po kolonama.38
Vizualizacija: Kreiranje grafikona je ključno za otkrivanje obrazaca. Na primer, countplot iz seaborn biblioteke može jasno pokazati da je stopa preživljavanja žena drastično veća od stope preživljavanja muškaraca. Slično, može se vizualizovati kako stopa preživljavanja opada sa klasom putovanja (1. > 2. > 3.).42 Histograma se koristi za analizu distribucije godina (Age) i cena karata (Fare) kako bi se uočile eventualne anomalije ili obrasci.43
Korak 3: Inženjering Karakteristika (Feature Engineering)
Ovo je često najkreativniji i najvažniji deo procesa, gde se od sirovih podataka prave informativnije karakteristike koje će modelu pomoći da bolje uči.
Kreiranje novih karakteristika:
FamilySize: Jednostavnim sabiranjem vrednosti iz kolona SibSp i Parch i dodavanjem 1 (za samog putnika), dobija se nova, često korisnija, karakteristika koja opisuje veličinu porodice.44
Title: Imena putnika sadrže titule kao što su "Mr.", "Mrs.", "Miss.", "Master." itd. Izdvajanje ovih titula može biti izuzetno korisno, jer one nose informaciju o polu, bračnom statusu, a ponekad i o starosti i socijalnom statusu putnika.39
Popunjavanje nedostajućih vrednosti (Imputation): Kolone Age, Cabin i Embarked imaju nedostajuće vrednosti.42 Postoje različite strategije za njihovo popunjavanje. ZaAge se često koristi medijana, dok se za Embarked koristi najčešća vrednost (mod). Popunjavanje Cabin je teže zbog velikog broja nedostajućih vrednosti, i često se ova kolona transformiše u binarnu karakteristiku (da li putnik ima kabinu ili ne) ili se potpuno odbacuje.39
Korak 4: Priprema Podataka i Treniranje Modela
Pre treniranja, podaci se moraju pripremiti:
Konverzija podataka: ML modeli rade sa brojevima, ne sa tekstom. Stoga se kategorijalne varijable kao što su Sex, Embarked i novokreirana Title moraju konvertovati u numerički format. Ovo se najčešće radi tehnikom "One-Hot Encoding".39
Podela podataka: Trening skup se deli na dva dela: veći deo za treniranje modela i manji (obično 20-30%) za validaciju, kako bi se proverilo kako se model ponaša na podacima koje nije video.7
Treniranje modela: Na pripremljenim podacima se trenira nekoliko različitih klasifikacionih algoritama, kao što su Logistic Regression, K-Nearest Neighbors, Support Vector Machines, Random Forest i Gradient Boosting (XGBoost).39
Korak 5: Evaluacija i Slanje Rešenja
Poređenje modela: Performanse svih treniranih modela se mere na validacionom skupu koristeći metriku tačnosti.
Finalni koraci: Model koji se pokazao najbolje se zatim trenira na celokupnom train.csv skupu podataka kako bi iskoristio sve dostupne informacije. Nakon toga, koristi se za generisanje predikcija za test.csv.
Formatiranje rešenja: Kreira se finalni .csv fajl koji mora imati tačno dve kolone: PassengerId i Survived, i predaje se na platformu.6
Prava vrednost Titanic projekta nije u postizanju visokog plasmana na rang listi. S obzirom da je to "Getting Started" takmičenje bez nagrada i poena, i da postoji ogroman broj javnih tutorijala, njegov cilj nije takmičenje, već edukacija.4 On pruža strukturirano i bezbedno okruženje za primenu celokupnog ciklusa nauke o podacima po prvi put. To je "pesak" u kojem se uči kako se grade "dvorci" od podataka, pre nego što se pređe na rešavanje stvarnih, kompleksnih problema gde su ulozi mnogo veći.
Deo 4: Profesionalni Priručnik – Napredovanje od Početnika do Eksperta
Savladavanje tehničkih veština je samo polovina puta. Pretvaranje tih veština u priznatu ekspertizu zahteva strateški pristup izgradnji portfolija, reputacije i kontinuiranom usavršavanju. Kaggle pruža sve potrebne alate za ovaj dugoročni proces.
Strategije za Dugoročni Uspeh
Učite od najboljih: Jedna od najvećih prednosti Kaggle-a je transparentnost. Nakon završetka svakog velikog takmičenja, pobednici su obavezni da objave detaljne opise svojih rešenja ("write-ups").48 Proučavanje ovih dokumenata, kao i visoko ocenjenih javnih notebook-ova, pruža neprocenjiv uvid u napredne tehnike i način razmišljanja vrhunskih stručnjaka.4
Kontinuirana praksa: Ne treba čekati idealno takmičenje da bi se vežbalo. Hiljade dostupnih skupova podataka omogućavaju rad na manjim, ličnim projektima koji mogu biti fokusirani na specifične veštine ili domene interesovanja.50
Gradite javni portfolio: U današnjem svetu, javno dostupan portfolio radova je često važniji od formalnih kvalifikacija.
Objavljujte kvalitetne Notebook-ove: Ne morate imati pobedničko rešenje da biste privukli pažnju. Dobro napisan, detaljno objašnjen i lepo vizualizovan notebook koji prikazuje temeljnu eksploratornu analizu ili kreativni pristup inženjeringu karakteristika može dobiti veliki broj glasova i postati vredna referenca.20
Kreirajte i delite skupove podataka: Pronalaženje, čišćenje, obogaćivanje i objavljivanje jedinstvenog i korisnog skupa podataka je izuzetno cenjen doprinos zajednici. To pokazuje veštine koje su fundamentalne za svakog data scientist-a i predstavlja snažan adut u portfoliju.10
Saradnja i umrežavanje: Udruživanje u timove na takmičenjima je odličan način za brže učenje, razmenu ideja i rešavanje kompleksnijih problema koji bi bili preveliki zalogaj za pojedinca.49 Aktivno učešće na forumima takođe gradi vidljivost i profesionalne kontakte.
Demistifikacija Sistema Napredovanja
Kaggle-ov sistem napredovanja (Progression System) je više od igre; to je vaša javna "radna knjižica" koja transparentno prikazuje vaša dostignuća i nivo stručnosti.16 Napredak se prati kroz tri odvojene, ali međusobno povezane staze:
Competitions, Datasets i Code. Moguće je napredovati u svakoj od njih nezavisno, što omogućava različite puteve do sticanja priznanja.17
